# ==================== 基本站点信息 ====================
title: kk的小窝               # 网站标题
subtitle: ''             # 网站副标题
description: ''          # 网站描述（用于 SEO）
keywords: null           # 网站关键词
author: kk3TWT         # 默认作者名称
language: zh-CN             # 默认语言
timezone: Asia/Shanghai             # 时区（留空则使用系统时区）

# ==================== URL 设置 ====================
url: http://example.com  # 网站完整 URL（必须以 http:// 或 https:// 开头）
permalink: ':year/:month/:day/:title/'   # 文章永久链接格式
permalink_defaults: null                 # 永久链接中各段的默认值
pretty_urls:             # 美化 URL 设置
  trailing_index: true   # 是否保留 URL 末尾的 index.html
  trailing_html: true    # 是否保留 URL 末尾的 .html

# ==================== 目录路径设置 ====================
source_dir: source       # 源文件目录（存放 Markdown 等）
public_dir: public       # 生成的静态文件输出目录
tag_dir: tags            # 标签页面目录
archive_dir: archives    # 归档页面目录
category_dir: categories # 分类页面目录
code_dir: downloads/code # 代码块下载目录
i18n_dir: ':lang'        # 国际化语言文件夹命名模式
skip_render: null        # 跳过渲染的目录或文件（支持 glob 表达式）

# ==================== 文章与页面设置 ====================
new_post_name: ':title.md'          # 新建文章时的默认文件名格式
default_layout: post                # 默认布局（post、page、draft）
titlecase: false                    # 是否自动将标题转换为首字母大写
filename_case: 0                    # 文件名大小写转换（0: 不变，1: 小写，2: 大写）
render_drafts: false                # 是否渲染草稿（drafts 文件夹）
post_asset_folder: false            # 是否启用文章资源文件夹（同名文件夹存放图片等）
relative_link: false                # 是否使用相对链接（建议 false）
future: true                        # 是否显示未来日期的文章

# ==================== 语法高亮设置 ====================
syntax_highlighter: highlight.js    # 高亮库：highlight.js 或 prismjs
highlight:                          # highlight.js 配置
  line_number: true                 # 是否显示行号
  auto_detect: false                # 是否自动检测语言
  tab_replace: ''                   # 替换 Tab 为指定字符串
  wrap: true                        # 是否包裹代码块
  hljs: false                       # 是否使用 hljs 类名
prismjs:                            # PrismJS 配置
  preprocess: true                  # 是否预处理
  line_number: true                 # 是否显示行号
  tab_replace: ''                   # 替换 Tab 为指定字符串

# ==================== 内容生成与分页 ====================
index_generator:                    # 首页生成器配置
  path: ''                          # 首页路径（空表示根目录）
  per_page: 10                      # 每页文章数量
  order_by: '-date'                 # 排序方式（-date 表示按日期倒序）
default_category: uncategorized     # 默认分类名称
category_map: null                  # 分类别名映射
tag_map: null                       # 标签别名映射
meta_generator: true                # 是否生成 meta 标签生成器

# ==================== 日期与时间格式 ====================
date_format: YYYY-MM-DD             # 日期显示格式
time_format: HH:mm:ss               # 时间显示格式
updated_option: mtime               # 更新日期依据（mtime: 文件修改时间, date: 文章 front-matter 中的 date）

# ==================== 分页与导航 ====================
per_page: 10                        # 每页默认显示的文章数（用于归档、标签等）
pagination_dir: page                # 分页目录名（例如 /page/2/）

# ==================== 包含/排除文件 ====================
include: null                       # 包含的额外文件或目录
exclude: null                       # 排除的文件或目录
ignore: null                        # 忽略的文件或目录（优先级高于 exclude）

# ==================== 主题与部署 ====================
theme: icarus                       # 使用的主题名称
deploy:                             # 部署配置
  type: git                         # 部署类型（git）
  repo: https://github.com/CMCC-114514/CMCC-114514.github.io  # 仓库地址
  branch: main                      # 部署分支